services:
  tombola:
    build: .
    image: tombola_2.0:latest
    container_name: tombola
    ports:
      - "2512:2512"
    environment:
      - NODE_ENV=production
      - PORT=2512
      - HOST=0.0.0.0
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
